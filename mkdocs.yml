site_name: Rubberdust
site_description: Hands-on cybersecurity write-ups, labs, projects, and systems engineering notes.
site_author: Dhico Satria
site_url: https://dhicosatria.github.io/docs/
copyright: Copyright &copy; 2026 Dhico Satria
validation:
  links:
    absolute_links: ignore
    unrecognized_links: warn
  nav:
    omitted_files: warn
theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
      toc_depth: 3
plugins:
  - search
  - blog
  - tags
  - glightbox
  - document-dates:
      type: datetime
      position: bottom
      locale: en
extra:
  analytics:
    provider: null
  comments:
    provider: utterances
    repo: dhicosatria/dhicosatria.github.io
    issue_term: pathname
    label: blog-comment
    theme: preferred-color-scheme
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dhicosatria
      name: Dhico Satria on GitHub
extra_css:
  - styles/extra.css
extra_javascript:
  - javascripts/catalog-pagination.js
nav:
  - Home: index.md
  - Writeups:
      - Overview: ctf/index.md
      - Event Series:
          - Advent of Cyber 2025:
              - Overview: ctf/advent-of-cyber_cyberstudent_2025/index.md
              - The Mission Begins: ctf/advent-of-cyber_cyberstudent_2025/day_1_The-Mission-Begins.md
              - The First Strike: ctf/advent-of-cyber_cyberstudent_2025/day_2_The-First-Strike.md
              - Syndicate Infrastructure: ctf/advent-of-cyber_cyberstudent_2025/day_3_Syndicate-Infrastructure.md
              - The Elf's Wager: ctf/advent-of-cyber_cyberstudent_2025/day_4_The-Elf's-Wager.md
              - Kramazon: ctf/advent-of-cyber_cyberstudent_2025/day_5_Kramazon.md
              - KDNU-3B: ctf/advent-of-cyber_cyberstudent_2025/day_6_KDNU-3B.md
              - Failed Exfil: ctf/advent-of-cyber_cyberstudent_2025/day_7_Failed-Exfil.md
              - Log Folly: ctf/advent-of-cyber_cyberstudent_2025/day_8_Log-Folly.md
              - Time to Escalate: ctf/advent-of-cyber_cyberstudent_2025/day_9_Time-to-Escalate.md
              - Jingle's Validator: ctf/advent-of-cyber_cyberstudent_2025/day_10_Jingle's-Validator.md
              - Syndiware: ctf/advent-of-cyber_cyberstudent_2025/day_11_Syndiware.md
              - Re-Key-Very: ctf/advent-of-cyber_cyberstudent_2025/day_12_Re-Key-very.md
              - Holiday Routing: ctf/advent-of-cyber_cyberstudent_2025/day_13_Holiday-Routing.md
              - Multifactorial: ctf/advent-of-cyber_cyberstudent_2025/day_14_Multifactorial.md
