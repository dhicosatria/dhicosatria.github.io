<meta property="og:site_name" content="{{ config.site_name }}">
<meta property="og:type" content="website">
<meta property="og:title" content="{% if page and page.title %}{{ page.title }} · {% endif %}{{ config.site_name }}">
<meta property="og:description" content="{% if page and page.meta.description %}{{ page.meta.description }}{% else %}{{ config.site_description }}{% endif %}">
<meta property="og:url" content="{{ page.canonical_url }}">
<meta name="twitter:card" content="summary">
