name: Deploy Bio Link and Docs to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v6
      - name: Checkout bio link
        uses: actions/checkout@v6
        with:
          repository: dhicosatria/bio-link
          path: _bio-link
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate docs
        run: mkdocs build --strict --site-dir /tmp/docs-validation
      - name: Build combined site
        run: |
          mkdir -p public/docs
          rsync -a --exclude=".git" --exclude=".github" _bio-link/ public/
          mkdocs build --strict --site-dir public/docs
          touch public/.nojekyll
      - name: Publish gh-pages branch
        run: |
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy ${GITHUB_SHA}"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
